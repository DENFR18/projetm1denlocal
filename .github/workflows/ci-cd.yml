name: CI/CD — Build, Push, Security, Deploy EKS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: den95/projetm1

jobs:
  # ─────────────────────────────────────────
  # 1. BUILD & TEST
  # ─────────────────────────────────────────
  build:
    name: Build & Test (Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build avec Maven
        run: mvn clean package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  # ─────────────────────────────────────────
  # 2. DOCKER BUILD & PUSH
  # ─────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker meta (tag = sha court)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

  # ─────────────────────────────────────────
  # 3. SCAN DE SÉCURITÉ (Trivy)
  # ─────────────────────────────────────────
  security:
    name: Scan Trivy — Vulnérabilités image
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Scan image avec Trivy (table)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Rapport Trivy (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload rapport sécurité
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: trivy-results.sarif
          retention-days: 30

  # ─────────────────────────────────────────
  # 4. DEPLOY SUR EKS
  # ─────────────────────────────────────────
  deploy:
    name: Deploy sur EKS
    runs-on: ubuntu-latest
    needs: [docker, security]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig (EKS)
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name   ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Appliquer RBAC et Secret Docker Hub
        run: |
          kubectl apply -f infra/k8s/rbac.yaml
          kubectl create secret docker-registry dockerhub-credentials \
            --docker-username=${{ secrets.DOCKER_USERNAME }} \
            --docker-password=${{ secrets.DOCKER_PASSWORD }} \
            --docker-server=https://index.docker.io/v1/ \
            --namespace=default \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Rolling update vers la nouvelle image
        run: |
          kubectl set image deployment/api-backend-deployment \
            api-container=${{ env.IMAGE_NAME }}:${{ needs.docker.outputs.image_tag }}

      - name: Attendre la fin du rollout
        run: |
          kubectl rollout status deployment/api-backend-deployment --timeout=120s

      - name: Appliquer HPA (auto-scaling)
        run: kubectl apply -f infra/k8s/hpa.yaml

      - name: Vérifier les pods et HPA
        run: |
          kubectl get pods -l app=api-backend
          kubectl get hpa api-backend-hpa

      - name: URL de l'application
        run: |
          echo "URL publique :"
          kubectl get svc api-backend-service \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
          echo ""
