name: CI/CD Pipeline API PaaS — AWS EKS

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v3

      - name: Configuration de Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilation et empaquetage (Maven)
        run: mvn clean package -DskipTests

      - name: Connexion à Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build et Push de l'image Docker
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/projetm1-api:latest
            ${{ secrets.DOCKER_USERNAME }}/projetm1-api:${{ github.sha }}

  deploy-to-eks:
    runs-on: ubuntu-latest
    needs: build-and-push   # Attend que le build soit terminé

    steps:
      - name: Récupération du code
        uses: actions/checkout@v3

      - name: Configuration des credentials AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Configuration de kubectl pour EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Création/mise à jour du secret Docker Hub
        run: |
          kubectl create secret docker-registry dockerhub-credentials \
            --docker-server=https://index.docker.io/v1/ \
            --docker-username=${{ secrets.DOCKER_USERNAME }} \
            --docker-password=${{ secrets.DOCKER_PASSWORD }} \
            --namespace=default \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Déploiement des manifestes Kubernetes (hors RBAC)
        run: |
          kubectl apply -f infra/k8s/namespace.yaml
          kubectl apply -f infra/k8s/deployment.yaml
          kubectl apply -f infra/k8s/hpa.yaml

      - name: Application du RBAC (nécessite droits cluster-admin)
        run: kubectl apply -f infra/k8s/rbac.yaml
        continue-on-error: true

      - name: Rolling update avec la nouvelle image
        run: |
          kubectl set image deployment/api-backend-deployment \
            api-container=${{ secrets.DOCKER_USERNAME }}/projetm1-api:${{ github.sha }}

      - name: Attente du déploiement
        run: |
          kubectl rollout status deployment/api-backend-deployment --timeout=120s
