name: CI/CD Pipeline API PaaS

# Le robot se réveille dès qu'on fait un "git push" sur la branche main
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v3

      - name: ☕ Configuration de Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🔨 Compilation et empaquetage (Maven)
        # On saute les tests pour gagner du temps, on génère le .jar
        run: mvn clean package -DskipTests

      - name: 🐳 Connexion à Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🚀 Build et Push de l'image Docker
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Remplace "votre-pseudo" par ton vrai pseudo Docker Hub si tu n'utilises pas le secret
          tags: ${{ secrets.DOCKER_USERNAME }}/projetm1-api:latest