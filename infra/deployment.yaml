apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-backend-deployment
spec:
  replicas: 2               # On demande 2 copies (Haute Dispo)
  selector:
    matchLabels:
      app: api-backend
  template:
    metadata:
      labels:
        app: api-backend
    spec:
      containers:
      - name: api-container
        image: den95/projetm1:v1  # TON image Docker Hub
        ports:
        - containerPort: 8080
        # Bonus Green IT : On limite la consommation RAM/CPU [cite: 187]
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-backend-service
spec:
  type: NodePort            # Ouvre un port vers l'extérieur
  selector:
    app: api-backend
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080       # Port fixe pour tester facilement