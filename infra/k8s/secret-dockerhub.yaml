# CE FICHIER N'EST PAS APPLIQUÉ DIRECTEMENT — le secret est créé dynamiquement dans la CI/CD
# via la commande :
#   kubectl create secret docker-registry dockerhub-credentials \
#     --docker-server=https://index.docker.io/v1/ \
#     --docker-username=<DOCKER_USERNAME> \
#     --docker-password=<DOCKER_TOKEN> \
#     --namespace=default \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Les credentials viennent des GitHub Secrets : DOCKER_USERNAME et DOCKER_PASSWORD
