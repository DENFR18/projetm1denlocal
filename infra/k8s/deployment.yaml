apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-backend-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-backend
  template:
    metadata:
      labels:
        app: api-backend
      annotations:
        # Prometheus auto-discovery : scraper ce pod
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
      - name: api-container
        image: den95/projetm1:v1
        ports:
        - containerPort: 8080
        # Green IT : limites CPU/RAM
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        # Vérification que l'app est vivante
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-backend-service
spec:
  type: LoadBalancer   # AWS crée automatiquement un ELB
  selector:
    app: api-backend
  ports:
    - port: 80
      targetPort: 8080
